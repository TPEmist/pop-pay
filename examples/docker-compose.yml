# Example Docker Compose for pop-pay
# Copy this file to your project root and run: docker-compose up -d
# See the root docker-compose.yml for the full reference.

version: "3.8"

services:
  pop-pay:
    build: ..
    container_name: pop-pay-mcp
    restart: unless-stopped
    environment:
      POP_ALLOWED_CATEGORIES: '["aws", "cloudflare", "openai", "github"]'
      POP_MAX_PER_TX: "100.0"
      POP_MAX_DAILY: "500.0"
      POP_BLOCK_LOOPS: "true"
      POP_CDP_URL: "http://chromium:9222"
      POP_AUTO_INJECT: "true"
    volumes:
      - ${HOME}/.config/pop-pay:/home/popuser/.config/pop-pay:ro
      - pop-state:/app/data
    stdin_open: true
    tty: false

  chromium:
    image: zenika/alpine-chrome:latest
    container_name: pop-pay-chromium
    restart: unless-stopped
    command:
      - "--no-sandbox"
      - "--disable-gpu"
      - "--disable-dev-shm-usage"
      - "--remote-debugging-address=0.0.0.0"
      - "--remote-debugging-port=9222"
    ports:
      - "9222:9222"
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  pop-state:
